name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  # ── 單元測試 + 覆蓋率（必須通過才能 Merge）────────────────
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests with coverage
        run: |
          pytest \
            --cov=src/analyzers \
            --cov=src/collectors/financial_collector \
            --cov=src/collectors/price_collector \
            --cov=dashboard/loaders \
            --cov=dashboard/pages/backtest \
            --cov-report=term-missing \
            --cov-fail-under=75

  # ── 程式碼風格（必須通過才能 Merge）──────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install lint tools
        run: pip install ruff black isort flake8

      - name: isort check
        # profile=black 讀自 pyproject.toml [tool.isort]
        run: isort --check-only src/ dashboard/ tests/ config.py

      - name: ruff check
        # rules & ignores 讀自 pyproject.toml [tool.ruff]
        run: ruff check src/ dashboard/ tests/ config.py

      - name: black format check
        # line-length 讀自 pyproject.toml [tool.black]
        run: black --check src/ dashboard/ tests/ config.py

      - name: flake8
        run: |
          flake8 src/ dashboard/ tests/ config.py \
            --max-line-length=88 \
            --extend-ignore=E203,W503,E501 \
            --per-file-ignores="tests/*:E402"
